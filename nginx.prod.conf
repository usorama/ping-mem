events {
  worker_connections 1024;
}

http {
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers on;
  ssl_ciphers HIGH:!aNULL:!MD5;

  # Rate limiting for ping-mem API
  limit_req_zone $binary_remote_addr zone=pingmem_api:10m rate=30r/s;

  # =============================================
  # assist.ping-gadgets.com (SN-Assist)
  # =============================================

  server {
    listen 80;
    server_name assist.ping-gadgets.com;
    return 301 https://$server_name$request_uri;
  }

  server {
    listen 443 ssl;
    server_name assist.ping-gadgets.com;

    ssl_certificate /etc/ssl/certs/nginx-selfsigned.crt;
    ssl_certificate_key /etc/ssl/private/nginx-selfsigned.key;

    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;

    location /v1/ {
      proxy_pass http://api:8000/v1/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 300s;
      proxy_connect_timeout 300s;
      proxy_send_timeout 300s;
      proxy_buffering off;
    }

    location = /health {
      proxy_pass http://api:8000/health;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /board/ {
      proxy_pass http://api:8000/board/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
      proxy_pass http://ui:8080/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_http_version 1.1;
      add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
  }

  # =============================================
  # ping-mem.ping-gadgets.com (ping-mem)
  # =============================================

  server {
    listen 80;
    server_name ping-mem.ping-gadgets.com;
    return 301 https://$server_name$request_uri;
  }

  server {
    listen 443 ssl;
    server_name ping-mem.ping-gadgets.com;

    ssl_certificate /etc/ssl/certs/nginx-selfsigned.crt;
    ssl_certificate_key /etc/ssl/private/nginx-selfsigned.key;

    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";

    # Health check — no rate limit
    location = /health {
      proxy_pass http://ping-mem:3000/health;
      proxy_set_header Host $host;
    }

    # Admin panel
    location /admin {
      limit_req zone=pingmem_api burst=5 nodelay;
      proxy_pass http://ping-mem:3000/admin;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API endpoints
    location /api/ {
      limit_req zone=pingmem_api burst=20 nodelay;
      proxy_pass http://ping-mem:3000/api/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 300s;
    }

    # SSE / StreamableHTTP — long-lived connections
    location /mcp {
      proxy_pass http://ping-mem:3000/mcp;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Connection "";
      proxy_http_version 1.1;
      proxy_buffering off;
      proxy_cache off;
      proxy_read_timeout 3600s;
      chunked_transfer_encoding on;
    }

    # UI dashboard
    location /ui {
      proxy_pass http://ping-mem:3000/ui;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Static assets
    location /static/ {
      proxy_pass http://ping-mem:3000/static/;
      proxy_set_header Host $host;
      proxy_cache_valid 200 1h;
    }

    # Catch-all
    location / {
      proxy_pass http://ping-mem:3000/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    }
  }
}
