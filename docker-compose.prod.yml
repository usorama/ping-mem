services:
  ping-mem-neo4j:
    image: neo4j:5.25-community
    container_name: ping-mem-neo4j
    environment:
      - NEO4J_AUTH=${NEO4J_USERNAME:-neo4j}/${NEO4J_PASSWORD}
      - NEO4J_dbms_memory_heap_initial__size=256m
      - NEO4J_dbms_memory_heap_max__size=512m
      - NEO4J_dbms_memory_pagecache_size=512m
    volumes:
      - ping-mem-neo4j-data:/data
      - ping-mem-neo4j-logs:/logs
    networks:
      - ping-mem-network
    restart: unless-stopped
    mem_limit: 1536m
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "${NEO4J_PASSWORD}", "RETURN 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  ping-mem-qdrant:
    image: qdrant/qdrant:v1.12.6
    container_name: ping-mem-qdrant
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    volumes:
      - ping-mem-qdrant-data:/qdrant/storage
    networks:
      - ping-mem-network
    restart: unless-stopped
    mem_limit: 512m
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  ping-mem:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ping-mem
    ports:
      - "127.0.0.1:3003:3003"
    environment:
      - PING_MEM_HOST=0.0.0.0
      - PING_MEM_PORT=3003
      - PING_MEM_TRANSPORT=streamable-http
      - PING_MEM_DB_PATH=/data/ping-mem.db
      - PING_MEM_DIAGNOSTICS_DB_PATH=/data/ping-mem-diagnostics.db
      - PING_MEM_ADMIN_DB_PATH=/data/ping-mem-admin.db
      - PING_MEM_API_KEY=${PING_MEM_API_KEY}
      - PING_MEM_ADMIN_USER=${PING_MEM_ADMIN_USER}
      - PING_MEM_ADMIN_PASS=${PING_MEM_ADMIN_PASS}
      - PING_MEM_SECRET_KEY=${PING_MEM_SECRET_KEY}
      - NEO4J_URI=bolt://ping-mem-neo4j:7687
      - NEO4J_USERNAME=${NEO4J_USERNAME:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD}
      - QDRANT_URL=http://ping-mem-qdrant:6333
      - QDRANT_COLLECTION_NAME=${QDRANT_COLLECTION_NAME:-ping-mem-vectors}
      - QDRANT_VECTOR_DIMENSIONS=${QDRANT_VECTOR_DIMENSIONS:-768}
      - NODE_ENV=production
      # Multi-agent memory settings (v2)
      # PING_MEM_MAX_AGENTS: Maximum number of registered agents (default: 100)
      - PING_MEM_MAX_AGENTS=${PING_MEM_MAX_AGENTS:-100}
      # Embedding provider configuration
      # Production typically uses Gemini or OpenAI (Ollama not available on VPS)
      - OLLAMA_URL=${OLLAMA_URL:-}
      - OLLAMA_EMBED_MODEL=${OLLAMA_EMBED_MODEL:-nomic-embed-text}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    volumes:
      - ping-mem-data:/data
    networks:
      - ping-mem-network
    depends_on:
      ping-mem-neo4j:
        condition: service_healthy
      ping-mem-qdrant:
        condition: service_healthy
    restart: unless-stopped
    mem_limit: 512m
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:3003/health | grep -q '\"status\":\"ok\"'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

networks:
  ping-mem-network:
    driver: bridge
    name: ping-mem-network

volumes:
  ping-mem-neo4j-data:
    name: ping-mem-neo4j-data
  ping-mem-neo4j-logs:
    name: ping-mem-neo4j-logs
  ping-mem-qdrant-data:
    name: ping-mem-qdrant-data
  ping-mem-data:
    name: ping-mem-data
