<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ping-mem Capability Scorecard</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f9;
      --surface: #ffffff;
      --surface-2: #eef2f6;
      --text: #151922;
      --muted: #5f6877;
      --line: #d9dee7;
      --green: #177245;
      --green-bg: #e8f6ef;
      --yellow: #8a5a00;
      --yellow-bg: #fff3cf;
      --red: #b42318;
      --red-bg: #fde7e4;
      --blue: #155eef;
      --blue-bg: #e8f0ff;
      --shadow: 0 1px 2px rgba(16, 24, 40, 0.08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.45;
    }
    main {
      max-width: 1240px;
      margin: 0 auto;
      padding: 28px 20px 48px;
    }
    header {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 20px;
      align-items: end;
      margin-bottom: 18px;
    }
    h1, h2, h3 { margin: 0; letter-spacing: 0; }
    h1 { font-size: 30px; line-height: 1.1; }
    h2 { font-size: 18px; margin: 28px 0 10px; }
    h3 { font-size: 15px; }
    p { margin: 6px 0 0; color: var(--muted); }
    .summary {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin: 18px 0;
    }
    .tile, .panel {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }
    .tile { padding: 14px; min-height: 96px; }
    .label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
    }
    .value { display: block; margin-top: 8px; font-size: 28px; font-weight: 800; }
    .small { font-size: 13px; color: var(--muted); }
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      margin: 18px 0;
    }
    input[type="search"] {
      min-width: 260px;
      flex: 1 1 280px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 10px 12px;
      font: inherit;
      background: var(--surface);
      color: var(--text);
    }
    button {
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 9px 11px;
      background: var(--surface);
      color: var(--text);
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }
    button[aria-pressed="true"] {
      border-color: var(--blue);
      background: var(--blue-bg);
      color: var(--blue);
    }
    table {
      width: 100%;
      border-collapse: collapse;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      box-shadow: var(--shadow);
    }
    th, td {
      padding: 11px 12px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
      font-size: 14px;
    }
    th {
      background: var(--surface-2);
      color: #344054;
      font-size: 12px;
      text-transform: uppercase;
    }
    tr:last-child td { border-bottom: 0; }
    .score { font-weight: 800; white-space: nowrap; }
    .badge {
      display: inline-flex;
      align-items: center;
      min-width: 68px;
      justify-content: center;
      border-radius: 999px;
      padding: 3px 9px;
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
    }
    .green { color: var(--green); background: var(--green-bg); }
    .yellow { color: var(--yellow); background: var(--yellow-bg); }
    .red { color: var(--red); background: var(--red-bg); }
    .blocked { color: #344054; background: var(--surface-2); }
    .panel { padding: 14px; margin-top: 12px; }
    .panel-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: start;
      margin-bottom: 8px;
    }
    .metric-list {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin-top: 10px;
    }
    .metric {
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 9px;
      background: #fbfcfe;
      min-height: 70px;
    }
    .metric strong {
      display: block;
      font-size: 13px;
      margin-bottom: 4px;
    }
    .decision {
      border-left: 4px solid var(--red);
      padding: 10px 12px;
      background: var(--surface);
      border-radius: 6px;
      margin-top: 8px;
      box-shadow: var(--shadow);
    }
    .decision.yellow { border-left-color: #d89d00; }
    .claim {
      margin: 6px 0;
      padding: 9px 10px;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 6px;
    }
    @media (max-width: 840px) {
      header { grid-template-columns: 1fr; }
      .summary { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .metric-list { grid-template-columns: 1fr; }
      th:nth-child(3), td:nth-child(3) { display: none; }
    }
    @media (max-width: 560px) {
      main { padding: 20px 12px 36px; }
      h1 { font-size: 24px; }
      .summary { grid-template-columns: 1fr; }
      table { display: block; overflow-x: auto; }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <h1>ping-mem Capability Scorecard</h1>
        <p>Visible proof map for objectives, outcomes, capabilities, and the rg versus ping-mem relationship-lift claim.</p>
      </div>
      <div class="small" id="generated"></div>
    </header>

    <section class="summary" id="summary"></section>

    <section class="toolbar" aria-label="Scorecard filters">
      <input id="search" type="search" placeholder="Search capability, feature, metric, or evidence">
      <button type="button" data-filter="all" aria-pressed="true">All</button>
      <button type="button" data-filter="green">Green</button>
      <button type="button" data-filter="yellow">Yellow</button>
      <button type="button" data-filter="red">Red</button>
      <button type="button" data-filter="failed">Failed Metrics</button>
    </section>

    <section>
      <h2>Decision Queue</h2>
      <div id="decisions"></div>
    </section>

    <section>
      <h2>Capability Metrics</h2>
      <div id="capability-table"></div>
      <div id="capability-details"></div>
    </section>

    <section>
      <h2>Feature Metrics</h2>
      <div id="feature-table"></div>
      <div id="feature-details"></div>
    </section>

    <section>
      <h2>Objective And Outcome Rollup</h2>
      <div id="rollups"></div>
    </section>

    <section>
      <h2>Claim Boundary</h2>
      <div id="claims"></div>
    </section>
  </main>

  <script>
    window.SCORECARD = {"generatedAt":"2026-05-03T05:14:32.728Z","liveChecksEnabled":false,"overall":{"score":94,"passed":49,"total":52,"status":"yellow"},"objectives":[{"id":"OBJ-1","score":83,"passed":5,"total":6,"status":"yellow"},{"id":"OBJ-2","score":100,"passed":6,"total":6,"status":"green"},{"id":"OBJ-3","score":100,"passed":6,"total":6,"status":"green"},{"id":"OBJ-4","score":100,"passed":4,"total":4,"status":"green"},{"id":"OBJ-5","score":100,"passed":4,"total":4,"status":"green"},{"id":"OBJ-6","score":100,"passed":5,"total":5,"status":"green"},{"id":"OBJ-7","score":100,"passed":6,"total":6,"status":"green"},{"id":"OBJ-8","score":100,"passed":4,"total":4,"status":"green"}],"outcomes":[{"id":"OUT-1","score":83,"passed":5,"total":6,"status":"yellow"},{"id":"OUT-2","score":100,"passed":6,"total":6,"status":"green"},{"id":"OUT-3","score":100,"passed":6,"total":6,"status":"green"},{"id":"OUT-4","score":100,"passed":4,"total":4,"status":"green"},{"id":"OUT-5","score":100,"passed":4,"total":4,"status":"green"},{"id":"OUT-6","score":100,"passed":5,"total":5,"status":"green"},{"id":"OUT-7","score":100,"passed":6,"total":6,"status":"green"},{"id":"OUT-8","score":100,"passed":4,"total":4,"status":"green"}],"capabilities":[{"id":"CAP-1","name":"Runtime Ground Truth","outcome":"OUT-4","objective":"OBJ-4","goal":"One local REST runtime owns writes, sessions, indexes, and project registry truth.","metrics":[{"name":"S002 REST owner issue done","passed":true,"weight":1,"detail":"passed"},{"name":"S010 runtime registry issue done","passed":true,"weight":1,"detail":"passed"},{"name":"Direct-mode quarantine evidence exists","passed":true,"weight":1,"detail":"passed"},{"name":"Runtime registry alignment evidence exists","passed":true,"weight":1,"detail":"passed"}],"score":100,"passed":4,"total":4,"status":"green"},{"id":"CAP-2","name":"Agent Reachability","outcome":"OUT-1","objective":"OBJ-1","goal":"Codex and Claude Code can reach the intended local runtime through approved entrypoints.","metrics":[{"name":"S003 unified CLI issue done","passed":true,"weight":1,"detail":"passed"},{"name":"S005 Codex memory proof issue done","passed":true,"weight":1,"detail":"passed"},{"name":"S006 Claude memory proof issue done","passed":true,"weight":1,"detail":"passed"},{"name":"S007 Codex codebase proof issue done","passed":true,"weight":1,"detail":"passed"},{"name":"S008 Claude codebase proof issue done","passed":true,"weight":1,"detail":"passed"},{"name":"Approved ping-mem wrapper projects","passed":false,"weight":1,"detail":"not run; use --live to execute"}],"score":83,"passed":5,"total":6,"status":"yellow"},{"id":"CAP-3","name":"Explicit Identity","outcome":"OUT-5","objective":"OBJ-5","goal":"Every approved path carries project, agent, and session identity or fails loudly.","metrics":[{"name":"S004 identity issue done","passed":true,"weight":1,"detail":"passed"},{"name":"Identity/path safety evidence exists","passed":true,"weight":1,"detail":"passed"},{"name":"Agent REST tests include graph identity gate","passed":true,"weight":1,"detail":"passed"},{"name":"Agent trust tests include graph answer identity","passed":true,"weight":1,"detail":"passed"}],"score":100,"passed":4,"total":4,"status":"green"},{"id":"CAP-4","name":"Memory Lifecycle Correctness","outcome":"OUT-2","objective":"OBJ-2","goal":"Save, search, retrieve, update/supersede, recall, delete, and confirm absent work end to end.","metrics":[{"name":"S005 Codex memory issue done","passed":true,"weight":1,"detail":"passed"},{"name":"S006 Claude memory issue done","passed":true,"weight":1,"detail":"passed"},{"name":"Codex proof JSON exists","passed":true,"weight":1,"detail":"passed"},{"name":"Claude proof JSON exists","passed":true,"weight":1,"detail":"passed"},{"name":"Codex memory proof ok","passed":true,"weight":1,"detail":"ok=true"},{"name":"Claude memory proof ok","passed":true,"weight":1,"detail":"ok=true"}],"score":100,"passed":6,"total":6,"status":"green"},{"id":"CAP-5","name":"Codebase Grounding Correctness","outcome":"OUT-3","objective":"OBJ-3","goal":"Verify, ingest, search, timeline, registered inventory, and file/line anchors work on real repos.","metrics":[{"name":"S007 Codex codebase issue done","passed":true,"weight":1,"detail":"passed"},{"name":"S008 Claude codebase issue done","passed":true,"weight":1,"detail":"passed"},{"name":"Codex codebase proof JSON exists","passed":true,"weight":1,"detail":"passed"},{"name":"Claude codebase proof JSON exists","passed":true,"weight":1,"detail":"passed"},{"name":"Codex codebase proof ok","passed":true,"weight":1,"detail":"ok=true"},{"name":"Claude codebase proof ok","passed":true,"weight":1,"detail":"ok=true"}],"score":100,"passed":6,"total":6,"status":"green"},{"id":"CAP-6","name":"Recovery And Readiness","outcome":"OUT-6","objective":"OBJ-6","goal":"Sleep, reboot, runtime restart, Neo4j restart, Qdrant restart, auth drift, and stale launchd states are known events.","metrics":[{"name":"S012 LaunchAgent hygiene issue done","passed":true,"weight":1,"detail":"passed"},{"name":"S013 recovery scenarios issue done","passed":true,"weight":1,"detail":"passed"},{"name":"Recovery scenario report exists","passed":true,"weight":1,"detail":"passed"},{"name":"LaunchAgent reconciliation evidence exists","passed":true,"weight":1,"detail":"passed"},{"name":"Sleep/wake HITL blocker remains explicit","passed":true,"weight":1,"detail":"passed"}],"score":100,"passed":5,"total":5,"status":"green"},{"id":"CAP-7","name":"Truthful Observability","outcome":"OUT-7","objective":"OBJ-7","goal":"Health, doctor, UI, logs, alerts, and graph answers distinguish healthy, stale, partial, blocked, and error states.","metrics":[{"name":"S009 failure-state honesty issue done","passed":true,"weight":1,"detail":"passed"},{"name":"S014 observability issue done","passed":true,"weight":1,"detail":"passed"},{"name":"S017 structured graph issue done","passed":true,"weight":1,"detail":"passed"},{"name":"Failure-state matrix exists","passed":true,"weight":1,"detail":"passed"},{"name":"Observability alignment evidence exists","passed":true,"weight":1,"detail":"passed"},{"name":"Structured graph evidence exists","passed":true,"weight":1,"detail":"passed"}],"score":100,"passed":6,"total":6,"status":"green"},{"id":"CAP-8","name":"Controlled Re-Adoption","outcome":"OUT-8","objective":"OBJ-8","goal":"Agent integrations are restored only after proof passes and final claims stay inside evidence.","metrics":[{"name":"S015 CLI-first re-adoption issue done","passed":true,"weight":1,"detail":"passed"},{"name":"S016 optional MCP proxy remains blocked/deferred","passed":true,"weight":1,"detail":"passed"},{"name":"S015 readoption report exists","passed":true,"weight":1,"detail":"passed"},{"name":"S016 quarantine report exists","passed":true,"weight":1,"detail":"passed"}],"score":100,"passed":4,"total":4,"status":"green"}],"features":[{"id":"FEATURE-graph-relationship-lift","name":"ping-mem relationship lift over rg","goal":"Return the files rg can reveal plus relationship edges, paths, provenance, and denominator evidence the user did not explicitly ask for.","metrics":[{"name":"Complete graph evidence file exists","passed":true,"weight":1,"detail":"complete_graph-answer.json"},{"name":"Complete answer has denominator","passed":true,"weight":1,"detail":"nodeCount=4, edgeCount=3"},{"name":"Complete answer has unasked relationship edges","passed":true,"weight":1,"detail":"edgeCount=3"},{"name":"Complete answer has source anchors","passed":true,"weight":1,"detail":"sourceAnchorCount=4"},{"name":"Semantic answer blocks completeness language","passed":true,"weight":1,"detail":"semantic blockedClaims mention incomplete"}],"extra":{"nodeCount":4,"edgeCount":3,"anchorCount":4},"score":100,"passed":5,"total":5,"status":"green"},{"id":"FEATURE-rg-baseline","name":"rg baseline remains available","goal":"rg stays the fast exact-match baseline; ping-mem must add relationship and provenance lift, not replace exact search.","metrics":[{"name":"rg exact search runs","passed":true,"weight":1,"detail":"9 hit(s)"},{"name":"rg finds direct text hits","passed":true,"weight":1,"detail":"9 hit(s) for Structured Knowledge Graph"}],"extra":{"query":"Structured Knowledge Graph","hits":9},"score":100,"passed":2,"total":2,"status":"green"},{"id":"FEATURE-live-ping-mem-discovery","name":"Live ping-mem discovery path","goal":"The approved ping-mem wrapper should discover indexed context when the runtime has ingestion configured.","metrics":[{"name":"ping-mem registered project inventory live check","passed":false,"weight":1,"detail":"not run; use --live to execute"},{"name":"ping-mem indexed discovery live check","passed":false,"weight":1,"detail":"not run; use --live to execute"}],"score":0,"passed":0,"total":2,"status":"red"},{"id":"FEATURE-optional-mcp-proxy","name":"Optional MCP proxy remains outside current claim","goal":"MCP can become a convenience adapter later, but it must not inflate the current proven capability score.","metrics":[{"name":"S016 is blocked/deferred","passed":true,"weight":1,"detail":"status=blocked"},{"name":"S016 quarantine evidence exists","passed":true,"weight":1,"detail":"passed"}],"score":100,"passed":2,"total":2,"status":"green"}],"claimBoundary":["Scorecard metrics are proof-routing signals, not a replacement for direct evidence.","ping-mem results are treated as discovery leads unless backed by evidence files, tests, or live runtime output.","S016 optional MCP proxy remains blocked/deferred and must not expand the current completion claim."]};
    const state = { filter: "all", search: "" };
    const card = window.SCORECARD;

    function badge(status) {
      return '<span class="badge ' + escapeHtml(status) + '">' + escapeHtml(status) + '</span>';
    }

    function rowMatches(row) {
      const haystack = JSON.stringify(row).toLowerCase();
      const searchOk = !state.search || haystack.includes(state.search);
      if (!searchOk) return false;
      if (state.filter === "all") return true;
      if (state.filter === "failed") return row.metrics.some(function(metric) { return !metric.passed; });
      return row.status === state.filter;
    }

    function renderSummary() {
      const graph = card.features.find(function(item) { return item.id === "FEATURE-graph-relationship-lift"; }) || {};
      const rg = card.features.find(function(item) { return item.id === "FEATURE-rg-baseline"; }) || {};
      const live = card.features.find(function(item) { return item.id === "FEATURE-live-ping-mem-discovery"; }) || {};
      const tiles = [
        ["Overall", card.overall.score + "%", card.overall.passed + "/" + card.overall.total + " metrics passed", card.overall.status],
        ["Graph Lift", (graph.extra && graph.extra.edgeCount || 0) + " edges", "Structured answer adds unasked relationships", graph.status || "red"],
        ["rg Baseline", (rg.extra && rg.extra.hits || 0) + " hits", "Exact search stays available", rg.status || "red"],
        ["Live Discovery", live.status || "red", card.liveChecksEnabled ? "Approved wrapper was executed" : "Run with --live for runtime proof", live.status || "red"],
      ];
      document.getElementById("summary").innerHTML = tiles.map(function(tile) {
        return '<article class="tile"><span class="label">' + escapeHtml(tile[0]) + '</span><span class="value">' + escapeHtml(tile[1]) + '</span><p>' + escapeHtml(tile[2]) + '</p><div style="margin-top:10px">' + badge(tile[3]) + '</div></article>';
      }).join("");
    }

    function renderTable(target, rows, columns) {
      const filtered = rows.filter(rowMatches);
      const body = filtered.map(function(row) {
        return '<tr><td><strong>' + escapeHtml(row.id || row.name) + '</strong><br><span class="small">' + escapeHtml(row.name || "") + '</span></td><td class="score">' + row.score + '%<br><span class="small">' + row.passed + '/' + row.total + '</span></td><td>' + badge(row.status) + '</td><td>' + escapeHtml(row.goal || "") + '</td></tr>';
      }).join("");
      document.getElementById(target).innerHTML = '<table><thead><tr>' + columns.map(function(col) { return '<th>' + escapeHtml(col) + '</th>'; }).join("") + '</tr></thead><tbody>' + (body || '<tr><td colspan="4">No rows match the current filter.</td></tr>') + '</tbody></table>';
    }

    function renderDetails(target, rows) {
      const filtered = rows.filter(rowMatches);
      document.getElementById(target).innerHTML = filtered.map(function(row) {
        const metrics = row.metrics.map(function(metric) {
          const status = metric.passed ? "green" : "red";
          return '<div class="metric"><strong>' + escapeHtml(metric.name) + '</strong>' + badge(status) + '<p>' + escapeHtml(metric.detail || "") + '</p></div>';
        }).join("");
        const extra = row.extra ? '<p class="small">Metric data: ' + escapeHtml(JSON.stringify(row.extra)) + '</p>' : "";
        return '<article class="panel"><div class="panel-head"><div><h3>' + escapeHtml((row.id ? row.id + " " : "") + row.name) + '</h3><p>' + escapeHtml(row.goal || "") + '</p></div>' + badge(row.status) + '</div>' + extra + '<div class="metric-list">' + metrics + '</div></article>';
      }).join("");
    }

    function renderDecisions() {
      const rows = card.features.concat(card.capabilities).filter(function(row) { return row.status !== "green"; });
      const decisions = rows.map(function(row) {
        const failed = row.metrics.filter(function(metric) { return !metric.passed; }).map(function(metric) { return metric.name + ": " + metric.detail; }).join("; ");
        const action = row.id === "FEATURE-live-ping-mem-discovery"
          ? "Fix the approved ping-mem runtime ingestion path before claiming live discovery is better than rg."
          : "Refine this capability until every metric has evidence or explicitly narrow the claim.";
        return '<div class="decision ' + escapeHtml(row.status) + '"><strong>' + escapeHtml(row.name) + '</strong><p>' + escapeHtml(action) + '</p><p class="small">' + escapeHtml(failed || "No failed metric detail available.") + '</p></div>';
      }).join("");
      document.getElementById("decisions").innerHTML = decisions || '<div class="decision yellow"><strong>No open scorecard actions</strong><p>All tracked metrics are green. Continue with broader acceptance testing before expanding the claim.</p></div>';
    }

    function renderRollups() {
      function miniTable(title, rows) {
        const body = rows.map(function(row) {
          return '<tr><td>' + escapeHtml(row.id) + '</td><td class="score">' + row.score + '%</td><td>' + badge(row.status) + '</td><td>' + row.passed + '/' + row.total + '</td></tr>';
        }).join("");
        return '<div class="panel"><h3>' + escapeHtml(title) + '</h3><table><thead><tr><th>ID</th><th>Score</th><th>Status</th><th>Metrics</th></tr></thead><tbody>' + body + '</tbody></table></div>';
      }
      document.getElementById("rollups").innerHTML = miniTable("Objectives", card.objectives) + miniTable("Outcomes", card.outcomes);
    }

    function renderClaims() {
      document.getElementById("claims").innerHTML = card.claimBoundary.map(function(claim) {
        return '<div class="claim">' + escapeHtml(claim) + '</div>';
      }).join("");
    }

    function render() {
      document.getElementById("generated").textContent = "Generated " + card.generatedAt + " | Live checks " + (card.liveChecksEnabled ? "enabled" : "disabled");
      renderSummary();
      renderDecisions();
      renderTable("capability-table", card.capabilities, ["Capability", "Score", "Status", "Goal"]);
      renderTable("feature-table", card.features, ["Feature", "Score", "Status", "Goal"]);
      renderDetails("capability-details", card.capabilities);
      renderDetails("feature-details", card.features);
      renderRollups();
      renderClaims();
    }

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, function(char) {
        return ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" })[char];
      });
    }

    document.getElementById("search").addEventListener("input", function(event) {
      state.search = event.target.value.trim().toLowerCase();
      render();
    });
    document.querySelectorAll("[data-filter]").forEach(function(button) {
      button.addEventListener("click", function() {
        state.filter = button.dataset.filter;
        document.querySelectorAll("[data-filter]").forEach(function(item) {
          item.setAttribute("aria-pressed", String(item === button));
        });
        render();
      });
    });
    render();
  </script>
</body>
</html>
