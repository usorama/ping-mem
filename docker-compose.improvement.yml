# Blue-Green Improvement Configuration
#
# Blue: production instance — NEVER modified during improvement runs
# Green: improvement experiments — isolated data volume, only started during nightly runs
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.improvement.yml --profile improvement up -d
#
# Critical constraint: Blue volumes are read-only during Green runs.
# Green gets its own data copy via volume snapshot before each run.

services:
  # Green: improvement experiments — isolated data volume
  ping-mem-green:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ping-mem-green
    ports:
      - "3001:3003"
    deploy:
      resources:
        limits:
          memory: 4G
    environment:
      - PING_MEM_HOST=0.0.0.0
      - PING_MEM_PORT=3003
      - PING_MEM_TRANSPORT=rest
      - PING_MEM_INSTANCE=green
      - PING_MEM_IMPROVEMENT_MODE=true
      - PING_MEM_DB_PATH=/data/ping-mem.db
      - PING_MEM_DIAGNOSTICS_DB_PATH=/data/ping-mem-diagnostics.db
      - PING_MEM_ADMIN_DB_PATH=/data/ping-mem-admin.db
      - PING_MEM_API_KEY=${PING_MEM_API_KEY:-}
      - PING_MEM_SECRET_KEY=${PING_MEM_SECRET_KEY:-}
      - NEO4J_URI=bolt://ping-mem-neo4j:7687
      - NEO4J_USERNAME=neo4j
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=neo4j_password
      - QDRANT_URL=http://ping-mem-qdrant:6333
      - QDRANT_COLLECTION_NAME=ping-mem-vectors
      - QDRANT_VECTOR_DIMENSIONS=768
      - NODE_ENV=production
    volumes:
      - ping-mem-green-data:/data
      - /Users/umasankr/Projects:/projects:ro  # READ-ONLY for Green
    networks:
      - ping-mem-network
    depends_on:
      ping-mem-neo4j:
        condition: service_healthy
      ping-mem-qdrant:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 3003 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 15s
    profiles:
      - improvement  # Only started during nightly runs

volumes:
  ping-mem-green-data:
    name: ping-mem-green-data
