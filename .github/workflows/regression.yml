name: Regression

on:
  pull_request:
    branches: ["main", "develop"]
  push:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      ping_mem_url:
        description: "ping-mem REST URL reachable from the runner"
        required: false
        default: "http://localhost:3003"

permissions:
  contents: read

concurrency:
  group: regression-${{ github.ref }}
  cancel-in-progress: true

jobs:
  regression:
    if: ${{ vars.PING_MEM_REGRESSION_ENABLED == 'true' }}
    runs-on: [self-hosted, ping-mem-integration]
    timeout-minutes: 15

    env:
      PING_MEM_URL: ${{ inputs.ping_mem_url || vars.PING_MEM_URL || 'http://localhost:3003' }}
      PING_MEM_ADMIN_USER: ${{ secrets.PING_MEM_ADMIN_USER || 'admin' }}
      PING_MEM_ADMIN_PASS: ${{ secrets.PING_MEM_ADMIN_PASS || 'ping-mem-dev-local' }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: "1.3.5"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build TypeScript
        run: bun run build

      - name: Probe ping-mem health
        run: curl -sf --max-time 10 "$PING_MEM_URL/health" > /dev/null

      - name: Run regression suite
        run: bun run test:regression
